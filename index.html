<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NovaFlex CRM</title>
<meta name="description" content="NovaFlex Peptides — Inventory &amp; CRM">
<meta name="theme-color" content="#08080a">

<!-- PWA manifest — this + the service worker + HTTPS is what makes the
     browser offer "Install" on desktop and "Add to Home Screen" on mobile -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<!-- React, without a build step: Babel Standalone compiles the JSX in
     app.js in the browser at load time. Fine for an internal team tool
     with a handful of users; if this ever needs to serve real public
     traffic at scale, a proper build (Vite/Next) would load faster. -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
  body { background: #09090b; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #18181b; }
  ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
</style>
</head>
<body>
  <div id="root"></div>

  <!-- App configuration: the only thing you need to change per environment -->
  <script>
    window.NOVAFLEX_API_URL = "https://api.novaflexusa.com"; // deployed backend (Railway, custom domain)
  </script>

  <script type="text/babel" src="icons.js"></script>
  <script type="text/babel" src="app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch((err) => {
          console.warn('Service worker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
